name: Publish

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      # Gate: never publish a tag that doesn't pass tests.
      - name: Test
        run: cargo test --all-targets

      - name: Classify tag
        id: classify
        run: |
          TAG="${GITHUB_REF_NAME}"
          # A pre-release tag contains a hyphen, e.g. v0.0.1-rc1 -> dry-run only.
          if [[ "$TAG" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi
          echo "tag_version=${TAG#v}" >> "$GITHUB_OUTPUT"

      # Pre-release tag (vX.Y.Z-rcN): verify packaging only, no upload.
      - name: Publish (dry-run)
        if: steps.classify.outputs.prerelease == 'true'
        run: cargo publish --dry-run

      # Release tag (vX.Y.Z): the tag must match the crate version.
      - name: Verify tag matches Cargo.toml version
        if: steps.classify.outputs.prerelease == 'false'
        run: |
          CARGO_VERSION="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')"
          TAG_VERSION="${{ steps.classify.outputs.tag_version }}"
          if [[ "$TAG_VERSION" != "$CARGO_VERSION" ]]; then
            echo "::error::Tag is v${TAG_VERSION} but Cargo.toml version is ${CARGO_VERSION} — bump the version or fix the tag."
            exit 1
          fi

      - name: Publish to crates.io
        if: steps.classify.outputs.prerelease == 'false'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish
